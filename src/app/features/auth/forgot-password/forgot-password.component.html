<div class="auth-layout">
  <div class="auth-card">
    
    <div class="auth-header">
      <div class="auth-icon">
        <mat-icon>lock_reset</mat-icon>
      </div>
      <h1 class="auth-title">Forgot password?</h1>
      <p class="auth-subtitle">
        Enter your email address and we'll send you a <br>
        6-digit OTP to reset your password.
      </p>
    </div>

    <div *ngIf="errorMessage" class="alert error">
      <mat-icon>error_outline</mat-icon>
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="alert success">
      <mat-icon>check_circle_outline</mat-icon>
      {{ successMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <label class="custom-label">Email address</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput formControlName="email" 
               type="email" placeholder="name&#64;example.com"
               autocomplete="email" />
        <mat-error *ngIf="email.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="email.hasError('email')">Invalid email address</mat-error>
      </mat-form-field>

      <button mat-flat-button class="auth-btn" 
              type="submit" [disabled]="loading || form.invalid">
        <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block; margin-right: 8px;"></mat-spinner>
        {{ loading ? 'Sending OTP...' : 'Send Reset OTP' }}
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/login" class="back-to-login">
        <mat-icon>arrow_back</mat-icon>
        Back to login
      </a>
    </div>

  </div>
</div>
