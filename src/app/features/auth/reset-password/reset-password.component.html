<div class="auth-layout">
  <div class="auth-card">
    
    <div class="auth-header">
      <div class="auth-icon">
        <mat-icon>vpn_key</mat-icon>
      </div>
      <h1 class="auth-title">Reset password</h1>
      <p class="auth-subtitle">
        Enter the OTP sent to <strong>{{ email }}</strong> <br>
        and choose a new secure password.
      </p>
    </div>

    <div *ngIf="errorMessage" class="alert error">
      <mat-icon>error_outline</mat-icon>
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="alert success">
      <mat-icon>check_circle_outline</mat-icon>
      {{ successMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      
      <label class="custom-label">Verification OTP</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput formControlName="otp" 
               placeholder="000000" maxlength="6" />
        <mat-error *ngIf="otp.hasError('required')">OTP is required</mat-error>
        <mat-error *ngIf="otp.hasError('pattern')">Must be 6 digits</mat-error>
      </mat-form-field>

      <label class="custom-label">New Password</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput [type]="hidePassword ? 'password' : 'text'" 
               formControlName="newPassword" />
        <button mat-icon-button matSuffix type="button" 
                (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="newPassword.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="newPassword.hasError('minlength')">At least 6 characters</mat-error>
      </mat-form-field>

      <label class="custom-label">Confirm New Password</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput [type]="hidePassword ? 'password' : 'text'" 
               formControlName="confirmPassword" />
        <mat-error *ngIf="form.hasError('mismatch')">Passwords do not match</mat-error>
      </mat-form-field>

      <button mat-flat-button class="auth-btn" 
              type="submit" [disabled]="loading || form.invalid">
        <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block; margin-right: 8px;"></mat-spinner>
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/login" class="back-to-login">
        <mat-icon>arrow_back</mat-icon>
        Back to login
      </a>
    </div>

  </div>
</div>
