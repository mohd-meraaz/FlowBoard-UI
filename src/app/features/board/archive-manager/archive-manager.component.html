<div class="archive-container">
  <div class="archive-header">
    <div class="header-info">
      <mat-icon class="header-icon">archive</mat-icon>
      <h3>Archived Items</h3>
    </div>
    <button mat-icon-button (click)="close()"><mat-icon>close</mat-icon></button>
  </div>

  <div class="archive-tabs">
    <button class="tab-btn" [class.active]="activeTab === 'cards'" (click)="activeTab = 'cards'">
      Cards ({{ archivedCards.length }})
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'lists'" (click)="activeTab = 'lists'">
      Lists ({{ archivedLists.length }})
    </button>
  </div>

  <mat-divider></mat-divider>

  <div class="archive-body">
    
    <!-- Cards Tab -->
    <div *ngIf="activeTab === 'cards'" class="tab-content">
      <div *ngIf="archivedCards.length === 0" class="empty-state">
        <mat-icon>credit_card_off</mat-icon>
        <p>No archived cards</p>
      </div>

      <div *ngIf="archivedCards.length > 0" class="item-list">
        <div *ngFor="let card of archivedCards" class="archive-item">
          <div class="item-info">
            <p class="item-name">{{ card.title }}</p>
            <span class="item-meta">Archived on {{ card.updatedAt | date:'MMM d, yyyy' }}</span>
          </div>
          <button mat-stroked-button color="primary" (click)="onRestoreCard(card)">
            Send to Board
          </button>
        </div>
      </div>
    </div>

    <!-- Lists Tab -->
    <div *ngIf="activeTab === 'lists'" class="tab-content">
      <div *ngIf="archivedLists.length === 0" class="empty-state">
        <mat-icon>playlist_remove</mat-icon>
        <p>No archived lists</p>
      </div>

      <div *ngIf="archivedLists.length > 0" class="item-list">
        <div *ngFor="let list of archivedLists" class="archive-item">
          <div class="item-info">
            <p class="item-name">{{ list.name }}</p>
            <span class="item-meta">Archived on {{ list.updatedAt | date:'MMM d, yyyy' }}</span>
          </div>
          <button mat-stroked-button color="primary" (click)="onRestoreList(list.id)">
            Send to Board
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
