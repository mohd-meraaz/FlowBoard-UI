<div class="notif-dropdown">
  <div class="dropdown-header">
    <h3>Notifications</h3>
    <button mat-button (click)="markAllAsRead()" *ngIf="unreadCount > 0" class="mark-btn">
      Mark all as read
    </button>
  </div>

  <mat-divider></mat-divider>

  <div class="dropdown-body">
    <div *ngIf="loading" class="loading-state">
      <mat-spinner diameter="32"></mat-spinner>
    </div>

    <div *ngIf="!loading && notifications.length === 0" class="empty-state">
      <mat-icon>notifications_off</mat-icon>
      <p>No notifications yet</p>
    </div>

    <div *ngIf="!loading && notifications.length > 0" class="notif-list">
      <div *ngFor="let n of notifications" 
           class="notif-item" 
           [class.unread]="!n.isRead"
           (click)="markAsRead(n)">
        <div class="notif-icon-box" [class]="n.type.toLowerCase()">
          <mat-icon>{{ getIcon(n.type) }}</mat-icon>
        </div>
        <div class="notif-content">
          <p class="notif-title">{{ n.title }}</p>
          <p class="notif-message">{{ n.message }}</p>
          <span class="notif-time">{{ n.createdAt | date:'MMM d, h:mm a' }}</span>
        </div>
        <div *ngIf="!n.isRead" class="unread-dot"></div>
      </div>
    </div>
  </div>

  <mat-divider></mat-divider>

  <div class="dropdown-footer">
    <button mat-button class="view-all-btn">View all notifications</button>
  </div>
</div>
