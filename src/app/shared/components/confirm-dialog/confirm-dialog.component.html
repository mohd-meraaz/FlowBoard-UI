<div class="flow-confirm-dialog">
  <div class="dialog-icon" [class.danger]="data.danger">
    <i [attr.data-lucide]="data.danger ? 'triangle-alert' : 'circle-help'"></i>
  </div>

  <h2 mat-dialog-title>{{ data.title }}</h2>

  <mat-dialog-content>
    <p>{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-stroked-button type="button" (click)="cancel()">{{ data.cancelText || 'Cancel' }}</button>
    <button mat-flat-button type="button" [class.danger]="data.danger" (click)="confirm()">{{ data.confirmText || 'Confirm' }}</button>
  </mat-dialog-actions>
</div>
